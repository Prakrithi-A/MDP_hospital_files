<!DOCTYPE html>
<html>
<head>
<title>View Patient Records</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 20px;
    background-image: url("/static/general.jpeg"); /* your bg image */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    min-height: 100vh;
    text-align: center;
    position: relative;
}

/* Light overlay so cards stay readable */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(232, 245, 233, 0.25);
    z-index: 0;
}

.card {
    background: rgba(152, 251, 152, 0.3); /* #98FB98 pale green, see-through */
    padding: 25px;
    margin: auto;
    width: 600px;
    border-radius: 15px;
    box-shadow: 0px 6px 18px rgba(0,0,0,0.2);
    backdrop-filter: blur(12px); /* glass effect */
    border: 1px solid rgba(255, 255, 255, 0.4);
    position: relative;
    z-index: 1;
}

h2 {
    color: #1B5E20;
    text-shadow: 0px 1px 2px rgba(255,255,255,0.6);
}

input {
    width: 80%;
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: 1px solid rgba(46, 125, 50, 0.4);
    background: rgba(255, 255, 255, 0.9);
}

button {
    padding: 10px 20px;
    background: #43A047;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
}

button:hover {
    background: #2E7D32;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
    background: rgba(255, 255, 255, 0.6);
    border-radius: 8px;
    overflow: hidden;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid rgba(46, 125, 50, 0.2);
    color: #1B5E20;
}

th {
    background: rgba(200, 230, 201, 0.8);
    font-weight: 600;
}

.msg {
    color: #1B5E20;
    margin-top: 10px;
    font-weight: bold;
    text-shadow: 0px 1px 2px rgba(255,255,255,0.5);
}

a {
    display: inline-block;
    margin-top: 15px;
    color: #1B5E20;
    font-weight: bold;
    text-decoration: none;
    text-shadow: 0px 1px 2px rgba(255,255,255,0.6);
}

a:hover {
    text-decoration: underline;
}

a.file-link {
    color: #2E7D32;
    font-weight: 600;
    margin-top: 0;
    text-shadow: none;
}

a.file-link:hover {
    color: #1B5E20;
}
</style>

</head>

<body>

<div class="card">

    <h2>View Patient Records</h2>

    <form method="POST">
        <input type="text" name="patient_id" placeholder="Enter Patient ID" required>
        <button type="submit">Search</button>
    </form>

    {% if message %}
        <div class="msg">{{ message }}</div>
    {% endif %}

    {% if records %}
        <table>
            <tr>
                <th>Doctor</th>
                <th>File</th>
                <th>Notes</th>
                <th>Date</th>
            </tr>

            {% for r in records %}
            <tr>
                <td>{{ r['doctor_id'] }}</td>
                <td>
                    <a class="file-link" href="{{ url_for('download_file', filename=r['file_name']) }}" target="_blank">
                        {{ r['file_name'] }}
                    </a>
                </td>
                <td>{{ r['notes'] }}</td>
                <td>{{ r['review_date'] }}</td>
            </tr>
            {% endfor %}
        </table>
    {% endif %}

    <a href="/doctor">← Back to Dashboard</a>

</div>

</body>
</html>
