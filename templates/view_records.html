<!DOCTYPE html>
<html>
<head>
<title>View Patient Records</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #E8F5E9, #A5D6A7);
    text-align: center;
    padding: 40px;
}

.card {
    background: white;
    padding: 25px;
    margin: auto;
    width: 600px;
    border-radius: 15px;
    box-shadow: 0px 6px 18px rgba(0,0,0,0.2);
}

h2 {
    color: #2E7D32;
}

input {
    width: 80%;
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    background: #43A047;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #2E7D32;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

th {
    background: #C8E6C9;
}

.msg {
    color: #1B5E20;
    margin-top: 10px;
    font-weight: bold;
}

a {
    display: inline-block;
    margin-top: 15px;
    color: #2E7D32;
    font-weight: bold;
    text-decoration: none;
}
</style>

</head>

<body>

<div class="card">

    <h2>View Patient Records</h2>

    <form method="POST">
        <input type="text" name="patient_id" placeholder="Enter Patient ID" required>
        <button type="submit">Search</button>
    </form>

    {% if message %}
        <div class="msg">{{ message }}</div>
    {% endif %}

    {% if records %}
        <table>
            <tr>
                <th>Doctor</th>
                <th>File</th>
                <th>Notes</th>
                <th>Date</th>
            </tr>

            {% for r in records %}
            <tr>
                <td>{{ r['doctor_id'] }}</td>
                <td>{{ r['file_name'] }}</td>
                <td>{{ r['notes'] }}</td>
                <td>{{ r['review_date'] }}</td>
            </tr>
            {% endfor %}
        </table>
    {% endif %}

    <a href="/doctor">← Back to Dashboard</a>

</div>

</body>
</html>
