<!DOCTYPE html>
<html>
<head>
    <title>Add / Update Patient Info</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #E8F5E9, #C8E6C9, #A5D6A7);
            height: 100vh;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #1B5E20;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 18px;
            width: 420px;
            margin: auto;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.15);
        }

        select, input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        .btn {
            margin-top: 15px;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 10px;
            background: linear-gradient(to right, #66BB6A, #43A047);
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        .btn:hover {
            background: linear-gradient(to right, #43A047, #2E7D32);
        }

        .message {
            margin-top: 15px;
            font-size: 14px;
            color: #2E7D32;
            font-weight: 500;
        }

        .back {
            display: inline-block;
            margin-top: 15px;
            color: #1B5E20;
            text-decoration: none;
            font-weight: 500;
        }

        .back:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="container">
    <h1>Patient Information</h1>

    <div class="card">

        <form method="POST">

            <!-- Patient ID Dropdown -->
            <select name="patient_id" required>
                <option value="">Select Patient ID</option>
                {% for id in patient_ids %}
                    <option value="{{ id }}">{{ id }}</option>
                {% endfor %}
            </select>

            <!-- Action -->
            <select name="action" required>
                <option value="add">Add New</option>
                <option value="update">Update Existing</option>
            </select>

            <!-- Fields -->
            <input type="text" name="name" placeholder="Full Name" value="{{ data[1] if data }}">
            <input type="text" name="gender" placeholder="Gender" value="{{ data[2] if data }}">
            <input type="date" name="dob" value="{{ data[3] if data }}">
            <input type="text" name="blood_group" placeholder="Blood Group" value="{{ data[4] if data }}">
            <input type="text" name="phone" placeholder="Phone Number" value="{{ data[5] if data }}">
            <input type="text" name="emergency_contact" placeholder="Emergency Contact" value="{{ data[6] if data }}">
            <input type="text" name="relation" placeholder="Relation (Parent/Spouse/etc.)" value="{{ data[7] if data }}">

            <button type="submit" class="btn">Submit</button>

        </form>

        {% if message %}
            <div class="message">{{ message }}</div>
        {% endif %}

        <a href="{{ url_for('admin_dashboard') }}" class="back">← Back to Dashboard</a>

    </div>
</div>

</body>
</html>
