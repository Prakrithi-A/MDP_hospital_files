<!DOCTYPE html>
<html>
<head>
    <title>Add Patient</title>

    <style>
        body {
             font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background-image: url("/static/general.jpeg"); /* your bg image */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            text-align: center;
            position: relative;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #1B5E20;
            margin-bottom: 25px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 18px;
            width: 450px;
            margin: auto;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.15);
            text-align: left;
        }

        label {
            font-weight: 600;
            color: #2E7D32;
            display: block;
            margin-top: 12px;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #66BB6A;
            box-shadow: 0 0 5px #A5D6A7;
        }

        .btn {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 10px;
            background: linear-gradient(to right, #66BB6A, #43A047);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
        }

        .btn:hover {
            background: linear-gradient(to right, #43A047, #2E7D32);
        }

        .message {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 600;
            color: #2E7D32;
            text-align: center;
        }

        .error {
            color: red;
        }

        .back {
            display: inline-block;
            margin-top: 15px;
            color: #1B5E20;
            text-decoration: none;
            font-weight: 600;
        }

        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Add Patient Info</h1>

    <div class="card">

        <form method="POST">

            <label>Patient ID</label>
            <input type="text" name="patient_id" placeholder="e.g. PT1111" required>

            <label>Full Name</label>
            <input type="text" name="name" placeholder="Enter full name" required>

            <label>Gender</label>
            <input type="text" name="gender" placeholder="Male / Female / Other" required>

            <label>Date of Birth</label>
            <input type="date" name="dob" required>

            <label>Blood Group</label>
            <input type="text" name="blood_group" placeholder="e.g. O+, A-, B+" required>

            <label>Phone Number</label>
            <input type="text" name="phone" placeholder="Enter phone number" required>

            <label>Emergency Contact</label>
            <input type="text" name="emergency_contact" placeholder="Emergency contact number">

            <label>Relation</label>
            <input type="text" name="relation" placeholder="e.g. Father, Mother">

            <button type="submit" class="btn">Add Patient</button>

        </form>

        {% if message %}
            <div class="message {{ 'error' if '❌' in message else '' }}">
                {{ message }}
            </div>
        {% endif %}

        <a href="{{ url_for('admin_dashboard') }}" class="back">← Back to Dashboard</a>

    </div>
</div>

</body>
</html>
