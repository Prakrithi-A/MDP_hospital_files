<!DOCTYPE html>
<html>
<head>
    <title>Add User</title>

    <style>
        body {
             font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background-image: url("/static/general.jpeg"); /* your bg image */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            text-align: center;
            position: relative;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #2E7D32;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            margin: auto;
            box-shadow: 0px 6px 20px rgba(0,0,0,0.15);
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #66BB6A;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #388E3C;
        }

        .msg {
            margin-top: 15px;
            color: #444;
        }
    </style>

</head>
<body>

<div class="container">
    <h1>Add User</h1>

    <div class="card">
        <form method="POST">

            <input type="text" name="user_id" placeholder="User ID" required>
            <input type="text" name="username" placeholder="Username" required>
            <input type="text" name="phone" placeholder="Phone Number" required>
            <input type="password" name="password" placeholder="Password" required>

            <select name="role">
                <option value="doctor">Doctor</option>
                <option value="patient">Patient</option>
            </select>

            <button type="submit">Add User</button>

        </form>

        {% if message %}
            <p class="msg">{{ message }}</p>
        {% endif %}
    </div>
</div>

</body>
</html>
