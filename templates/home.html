<!DOCTYPE html>
<html>
<head>
    <title>Hospital System</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-image: url("/static/home.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            color: white;
            padding: 40px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            backdrop-filter: blur(4px);
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 25px;
            background: #43A047;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: #2E7D32;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>ClinicVault Hospital Management System</h1>
        <p>Secure | Efficient | Smart Healthcare Platform</p>
        <a href="/login" class="btn">Enter Application</a>
    </div>
</body>
</html>
