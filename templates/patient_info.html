<!DOCTYPE html>
<html>
<head>
    <title>Patient Info</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #E8F5E9, #A5D6A7);
            text-align: center;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 18px;
            width: 420px;
            margin: auto;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.15);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #66BB6A;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #388E3C;
        }

        h2 {
            color: #2E7D32;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Search Patient</h2>

    <!-- FIX: changed POST → GET -->
    <form method="GET" action="{{ url_for('patient_info') }}">
        <input type="text" name="patient_id" placeholder="Enter Patient ID">
        <button type="submit">Search</button>
    </form>

    {% if message %}
        <p style="color:red">{{ message }}</p>
    {% endif %}

</div>

</body>
</html>
