<!DOCTYPE html>
<html>
<head>
    <title>Patient Info</title>
    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(to right, #E8F5E9, #A5D6A7);
            text-align: center;
        }
        .card {
            background: white;
            padding: 25px;
            width: 400px;
            margin: auto;
            border-radius: 12px;
        }
        input, button {
            margin: 8px;
            padding: 10px;
            width: 90%;
        }
        button {
            background: #43A047;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>View Patient Info</h2>

    <form method="POST">
        <input type="text" name="patient_id" placeholder="Enter Patient ID" required>
        <button type="submit">Search</button>
    </form>

    {% if data %}
        <hr>
        <p><b>Name:</b> {{ data[1] }}</p>
        <p><b>Gender:</b> {{ data[2] }}</p>
        <p><b>Age:</b> {{ data[3] }}</p>
        <p><b>Phone:</b> {{ data[4] }}</p>
        <p><b>Blood Group:</b> {{ data[5] }}</p>
        <p><b>Emergency Contact:</b> {{ data[6] }}</p>
        <p><b>Relation:</b> {{ data[7] }}</p>

        <a href="{{ url_for('update_patient', patient_id=data[0]) }}">
            <button>Update Info</button>
        </a>
    {% endif %}
</div>

</body>
</html>
