<!DOCTYPE html>
<html>
<head>
    <title>All Records</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #E8F5E9, #C8E6C9, #A5D6A7);
            margin: 0;
        }

        .container {
            width: 500px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            color: #1B5E20;
            margin-bottom: 20px;
        }

        .file {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .delete-btn {
            color: white;
            background: #E53935;
            padding: 6px 10px;
            border-radius: 6px;
            text-decoration: none;
        }

        .delete-btn:hover {
            background: #B71C1C;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Uploaded Records</h2>

    {% for file in files %}
        <div class="file">
            <span>{{ file }}</span>
            <a href="{{ url_for('delete_file', filename=file) }}" class="delete-btn">
                Delete
            </a>
        </div>
    {% endfor %}

</div>

</body>
</html>
