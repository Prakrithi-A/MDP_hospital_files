<!DOCTYPE html>
<html>
<head>
    <title>Patient Records</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background-image: url("/static/general.jpeg"); /* your bg image */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            text-align: center;
            position: relative;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 18px;
            width: 600px;
            margin: auto;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.15);
        }

        h2 {
            color: #1B5E20;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 8px;
        }

        button:hover {
            background: #1B5E20;
        }

        .record {
            background: #E8F5E9;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            text-align: left;
        }

        .msg {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>View Patient Medical Records</h2>

    <form method="POST">
        <input type="text" name="patient_id" placeholder="Enter Patient ID" required>
        <button type="submit">Search</button>
    </form>

    {% if message %}
        <p class="msg">{{ message }}</p>
    {% endif %}

    {% if records %}
        {% for r in records %}
            <div class="record">
                <b>Doctor ID:</b> {{ r['doctor_id'] }} <br>
                <b>File Name:</b> {{ r['file_name'] }} <br>
                <b>Notes:</b> {{ r['notes'] }} <br>
                <b>Review Date:</b> {{ r['review_date'] }}
            </div>
        {% endfor %}
    {% endif %}

</div>

</body>
</html>
