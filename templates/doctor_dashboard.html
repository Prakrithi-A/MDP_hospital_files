<!DOCTYPE html>
<html>
<head>
    <title>Doctor Dashboard</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-image: url("/static/dash.jpeg"); /* your bg image */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            text-align: center;
            padding: 40px;
            position: relative;
        }

        /* Light overlay so the see-through box stays readable */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(232, 245, 233, 0.25);
            z-index: 0;
        }

        .card {
            background: rgba(152, 251, 152, 0.3); /* #98FB98 pale green, see-through */
            padding: 35px;
            border-radius: 15px;
            width: 420px;
            margin: auto;
            box-shadow: 0px 6px 20px rgba(0,0,0,0.15);
            backdrop-filter: blur(12px); /* glass effect */
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            z-index: 1;
        }

        h2 {
            color: #1B5E20;
            margin-bottom: 25px;
            font-weight: 700;
            text-shadow: 0px 1px 2px rgba(255,255,255,0.6);
        }

        a {
            display: block;
            margin: 12px 0;
            padding: 12px;
            background: linear-gradient(to right, #66BB6A, #43A047);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.2s;
        }

        a:hover {
            background: linear-gradient(to right, #43A047, #2E7D32);
            transform: scale(1.03);
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
        }

        .logout {
            background: #C62828;
        }

        .logout:hover {
            background: #8E0000;
        }

        .note {
            font-size: 13px;
            color: #1B5E20;
            margin-top: 10px;
            font-weight: 500;
            text-shadow: 0px 1px 2px rgba(255,255,255,0.5);
        }
    </style>
</head>

<body>
<div class="card">
    <h2>Doctor Dashboard</h2>

    <!-- FIXED ROUTES -->
    <a href="/doctor/view_records">View Patient Records</a>
    <a href="/doctor/add_health">Add Health Status</a>
    <a href="/doctor/upload_record">Upload Records</a>
    <a href="/doctor/view_patient_info">View Patient Info</a>

    <a href="/logout" class="logout">Logout</a>

    <div class="note">
        Green Health System v1.0
    </div>
</div>
</body>
</html>
