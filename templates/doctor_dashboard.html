<!DOCTYPE html>
<html>
<head>
    <title>Doctor Dashboard</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #E8F5E9, #A5D6A7);
            text-align: center;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 15px;
            width: 420px;
            margin: auto;
            box-shadow: 0px 6px 20px rgba(0,0,0,0.15);
        }

        h2 {
            color: #2E7D32;
            margin-bottom: 25px;
        }

        a {
            display: block;
            margin: 12px 0;
            padding: 12px;
            background: linear-gradient(to right, #66BB6A, #43A047);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.2s;
        }

        a:hover {
            background: linear-gradient(to right, #43A047, #2E7D32);
            transform: scale(1.03);
        }

        .logout {
            background: #C62828;
        }

        .logout:hover {
            background: #8E0000;
        }

        .note {
            font-size: 13px;
            color: gray;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Doctor Dashboard</h2>

    <!-- FIXED ROUTES -->
    <a href="/doctor/view_records">View Patient Records</a>
    <a href="/doctor/add_health">Add Health Status</a>
    <a href="/doctor/upload_record">Upload Records</a>
    <a href="/doctor/view_patient_info">View Patient Info</a>

    <a href="/logout" class="logout">Logout</a>

    <div class="note">
        Green Health System v1.0
    </div>

</div>

</body>
</html>
