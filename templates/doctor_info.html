<!DOCTYPE html>
<html>
<head>
    <title>Doctor Info</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #E8F5E9, #A5D6A7);
            text-align: center;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 18px;
            width: 420px;
            margin: auto;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.15);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #66BB6A;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #388E3C;
        }

        h2 {
            color: #2E7D32;
        }

        .message {
            color: red;
            margin-top: 10px;
        }

        .divider {
            margin: 20px 0;
            height: 1px;
            background: #ddd;
        }
    </style>
</head>

<body>

<div class="card">

    <!-- 🔍 SEARCH -->
    <h2>Search Doctor</h2>

    <form method="POST">
        <input type="text" name="doctor_id" placeholder="Enter Doctor ID" required>
        <button type="submit">Search</button>
    </form>

    {% if message %}
        <p class="message">{{ message }}</p>
    {% endif %}

    {% if data %}

    <div class="divider"></div>

    <h2>Edit Doctor Info</h2>

    <form method="POST" action="{{ url_for('update_doctor', doctor_id=data['doctor_id']) }}">

        <input type="text" name="name" value="{{ data['name'] }}" required>
        <input type="text" name="specialization" value="{{ data['specialization'] }}" required>
        <input type="text" name="experience" value="{{ data['experience'] }}" required>
        <input type="text" name="phone" value="{{ data['phone'] }}">

        <button type="submit">Update</button>

    </form>

    {% endif %}

</div>

</body>
</html>
