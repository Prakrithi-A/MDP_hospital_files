<!DOCTYPE html>
<html>
<head>
    <title>Doctor Info</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #E8F5E9, #A5D6A7);
            text-align: center;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 18px;
            width: 450px;
            margin: auto;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.15);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #43A047;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #2E7D32;
        }

        h2 {
            color: #1B5E20;
        }

        .divider {
            margin: 20px 0;
            height: 1px;
            background: #ddd;
        }

        .box {
            text-align: left;
            background: #F1F8E9;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .msg {
            color: red;
            font-weight: 500;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Search Doctor</h2>

    <form method="POST">
        <input type="text" name="doctor_id" placeholder="Enter Doctor ID" required>
        <button type="submit">Search</button>
    </form>

    {% if message %}
        <p class="msg">{{ message }}</p>
    {% endif %}

    {% if data %}
    <div class="divider"></div>

    <h2>Doctor Details</h2>

    <div class="box">
        <p><b>ID:</b> {{ data['doctor_id'] }}</p>
        <p><b>Name:</b> {{ data['name'] }}</p>
        <p><b>Specialization:</b> {{ data['specialization'] }}</p>
        <p><b>Experience:</b> {{ data['experience'] }}</p>
        <p><b>Phone:</b> {{ data['phone'] }}</p>
    </div>

    {% endif %}

</div>

</body>
</html>
