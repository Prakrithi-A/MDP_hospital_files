<!DOCTYPE html>
<html>
<head>
    <title>Add Doctor Info</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-image: url("/static/general.jpeg"); /* your bg image */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Light overlay so form stays readable */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(232, 245, 233, 0.25);
            z-index: 0;
        }

        .card {
            background: rgba(152, 251, 152, 0.3); /* #98FB98 pale green, see-through */
            padding: 30px;
            border-radius: 18px;
            width: 380px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.15);
            backdrop-filter: blur(12px); /* glass effect */
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            z-index: 1;
        }

        h2 {
            text-align: center;
            color: #1B5E20;
            margin-top: 0;
            font-weight: 700;
            text-shadow: 0px 1px 2px rgba(255,255,255,0.6);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid rgba(46, 125, 50, 0.4);
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.9);
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #66BB6A, #43A047);
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 8px;
        }

        button:hover {
            background: linear-gradient(to right, #43A047, #2E7D32);
            transform: translateY(-1px);
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
        }

        .msg {
            text-align: center;
            margin-top: 12px;
            color: #1B5E20;
            font-weight: 600;
            text-shadow: 0px 1px 2px rgba(255,255,255,0.5);
        }
    </style>
</head>

<body>
<div class="card">
    <h2>Add Doctor Info</h2>

    <form method="POST">
        <input type="text" name="doctor_id" placeholder="Doctor ID" required>
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="text" name="specialization" placeholder="Specialization" required>
        <input type="number" name="experience" placeholder="Years of Experience" required>
        <input type="text" name="phone" placeholder="Phone Number" required>
        <input type="text" name="license" placeholder="License Number" required>
        <button type="submit">Add Doctor</button>
    </form>

    <div class="msg">{{ message }}</div>
</div>
</body>
</html>
