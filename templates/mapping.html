<!DOCTYPE html>
<html>
<head>
    <title>Doctor-Patient Mapping</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background-image: url("/static/general.jpeg"); /* your bg image */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            text-align: center;
            position: relative;
        }

        /* Light overlay so cards stay readable */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(232, 245, 233, 0.25);
            z-index: 0;
        }

        h2 {
            color: #1B5E20;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            text-shadow: 0px 1px 2px rgba(255,255,255,0.6);
        }

        .card {
            background: rgba(152, 251, 152, 0.3); /* #98FB98 pale green, see-through */
            padding: 25px;
            width: 450px;
            margin: 20px auto;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.15);
            backdrop-filter: blur(12px); /* glass effect */
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            z-index: 1;
        }

        select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid rgba(46, 125, 50, 0.4);
            font-size: 14px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.9);
        }

        button {
            background: linear-gradient(to right, #66BB6A, #43A047);
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: linear-gradient(to right, #43A047, #2E7D32);
            transform: translateY(-1px);
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
        }

        .msg {
            font-weight: bold;
            margin-top: 10px;
            color: #1B5E20;
            text-shadow: 0px 1px 2px rgba(255,255,255,0.5);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: rgba(200, 230, 201, 0.7); /* lighter green, semi-transparent */
            margin: 8px;
            padding: 10px;
            border-radius: 10px;
            font-weight: 500;
            color: #1B5E20;
        }

        h3 {
            color: #1B5E20;
            margin-top: 0;
            text-shadow: 0px 1px 2px rgba(255,255,255,0.6);
        }

        .back {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #1B5E20;
            font-weight: bold;
            position: relative;
            z-index: 1;
            text-shadow: 0px 1px 2px rgba(255,255,255,0.6);
        }

        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
<h2>Doctor ↔ Patient Mapping</h2>

<div class="card">
    <form method="POST">
        <!-- DOCTORS DROPDOWN -->
        <select name="doctor_id" required>
            <option value="">Select Doctor</option>
            {% for d in doctors %}
                <option value="{{ d['doctor_id'] }}">
                    {{ d['doctor_id'] }} - {{ d['name'] }}
                </option>
            {% endfor %}
        </select>

        <!-- PATIENTS DROPDOWN -->
        <select name="patient_id" required>
            <option value="">Select Patient</option>
            {% for p in patients %}
                <option value="{{ p['patient_id'] }}">
                    {{ p['patient_id'] }} - {{ p['name'] }}
                </option>
            {% endfor %}
        </select>

        <button type="submit">Map Doctor → Patient</button>
    </form>

    {% if message %}
        <div class="msg">{{ message }}</div>
    {% endif %}
</div>

<div class="card">
    <h3>Existing Mappings</h3>

    {% if mappings %}
        <ul>
            {% for m in mappings %}
                <li>
                    Doctor: <b>{{ m['doctor_id'] }}</b>
                    →
                    Patient: <b>{{ m['patient_id'] }}</b>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p style="color:#1B5E20;">No mappings found.</p>
    {% endif %}
</div>

<a class="back" href="{{ url_for('admin_dashboard') }}">← Back to Dashboard</a>

</body>
</html>
