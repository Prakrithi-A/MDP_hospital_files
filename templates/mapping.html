<!DOCTYPE html>
<html>
<head>
    <title>Doctor-Patient Mapping</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(to right, #E8F5E9, #A5D6A7);
            text-align: center;
        }

        .card {
            background: white;
            padding: 25px;
            width: 420px;
            margin: 30px auto;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        input, button {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            background: #66BB6A;
            color: white;
            border: none;
            border-radius: 8px;
        }

        button:hover {
            background: #388E3C;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #C8E6C9;
            margin: 8px;
            padding: 10px;
            border-radius: 8px;
        }

        .msg {
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Doctor-Patient Mapping</h2>

<div class="card">
    <form method="POST">
        <input name="doctor_id" placeholder="Doctor ID" required>
        <input name="patient_id" placeholder="Patient ID" required>
        <button type="submit">Add Mapping</button>
    </form>

    <p class="msg">{{ message }}</p>
</div>

<div class="card">
    <h3>Existing Mappings</h3>

    <ul>
        {% for d, p in mappings %}
            <li>Doctor: {{ d }} → Patient: {{ p }}</li>
        {% endfor %}
    </ul>
</div>

<a href="/admin">← Back</a>

</body>
</html>
