<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(to right, #E8F5E9, #A5D6A7);
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #2E7D32;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            margin: auto;
            box-shadow: 0px 6px 20px rgba(0,0,0,0.15);
        }

        .btn {
            display: block;
            margin: 15px 0;
            padding: 12px;
            background: #66BB6A;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
            font-weight: 500;
        }

        .btn:hover {
            background: #388E3C;
        }
    </style>

</head>
<body>

<div class="container">
    <h1>Admin Dashboard</h1>

    <div class="card">
        <a href="/upload" class="btn">Upload Medical Record</a>
        <a href="/patients" class="btn">View All Records</a>
        <a href="/doctors" class="btn">Manage Doctors</a>
        <a href="/mapping" class="btn">Doctor-Patient Mapping</a>
    </div>
</div>

</body>
</html>
