<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #E8F5E9, #C8E6C9, #A5D6A7);
            height: 100vh;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #1B5E20;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 18px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.15);
        }

        .section-title {
            margin-top: 18px;
            font-size: 13px;
            color: #4CAF50;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
        }

        .btn {
            display: block;
            margin: 12px 0;
            padding: 13px;
            background: linear-gradient(to right, #66BB6A, #43A047);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn:hover {
            transform: scale(1.03);
            background: linear-gradient(to right, #43A047, #2E7D32);
            box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
        }

        .logout {
            margin-top: 20px;
            display: inline-block;
            color: #C62828;
            font-size: 14px;
            text-decoration: none;
            font-weight: 500;
        }

        .logout:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="container">
    <h1>Admin Dashboard</h1>

    <div class="card">

        <div class="section-title">Records</div>
        <a href="{{ url_for('upload') }}" class="btn">Upload Medical Record</a>
        <a href="{{ url_for('patients') }}" class="btn">View All Records</a>

        <div class="section-title">Management</div>
        <a href="{{ url_for('add_user') }}" class="btn">Add Users</a>
        <a href="{{ url_for('mapping') }}" class="btn">Doctor–Patient Mapping</a>
        <a href="{{ url_for('doctors') }}" class="btn">Manage Doctors</a>

        <a href="{{ url_for('logout') }}" class="logout">Logout</a>

    </div>
</div>

</body>
</html>
