<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #E8F5E9, #C8E6C9, #A5D6A7);
            height: 100vh;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #1B5E20;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 18px;
            width: 420px;
            margin: auto;
            box-shadow: 0px 12px 30px rgba(0, 0, 0, 0.15);
        }

        .section-title {
            margin-top: 20px;
            font-size: 13px;
            color: #2E7D32;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
        }

        .btn {
            display: block;
            margin: 10px 0;
            padding: 14px;
            background: linear-gradient(90deg, #66BB6A, #43A047);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.02);
            background: linear-gradient(90deg, #43A047, #2E7D32);
            box-shadow: 0px 6px 15px rgba(0,0,0,0.2);
        }

        .logout {
            margin-top: 20px;
            display: inline-block;
            color: #C62828;
            font-size: 14px;
            text-decoration: none;
            font-weight: 600;
        }

        .logout:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="container">
    <h1>Admin Dashboard</h1>

    <div class="card">

        <div class="section-title">Records</div>
        <a href="{{ url_for('upload') }}" class="btn">Upload Medical Record</a>
        <a href="{{ url_for('patients') }}" class="btn">View Patient Records</a>

        <div class="section-title">User Management</div>
        <a href="{{ url_for('add_user') }}" class="btn">Add Users</a>
        <a href="{{ url_for('mapping') }}" class="btn">Doctor–Patient Mapping</a>
        <a href="{{ url_for('doctors') }}" class="btn">Manage Doctors</a>

        <div class="section-title">Information</div>
        <a href="{{ url_for('add_patient') }}" class="btn">Add Patient Info</a>
        <a href="{{ url_for('add_doctor') }}" class="btn">Add Doctor Info</a>
        <a href="{{ url_for('patient_info') }}" class="btn">View Patient Info</a>
        <a href="{{ url_for('doctor_info') }}" class="btn">View Doctor Info</a>

        <a href="{{ url_for('logout') }}" class="logout">Logout</a>

    </div>
</div>

</body>
</html>
