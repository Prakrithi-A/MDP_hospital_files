<!DOCTYPE html>
<html>
<head>
    <title>Hospital Login</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'EB Garamond', Garamond, Georgia, serif;
            background-image: url("/static/login_image.jpeg");
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            animation: slowZoom 30s ease-in-out infinite alternate;
        }

        @keyframes slowZoom {
            from { background-size: 100% auto; }
            to { background-size: 108% auto; }
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(232, 245, 233, 0.25);
            z-index: 0;
            animation: breathe 12s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { background: rgba(232, 245, 233, 0.25); }
            50% { background: rgba(232, 245, 233, 0.15); }
        }

        .container {
            background: rgba(152, 251, 152, 0.25);
            padding: 35px 30px;
            border-radius: 18px;
            width: 400px;
            box-shadow: 0px 8px 32px rgba(0,0,0,0.25);
            backdrop-filter: blur(14px);
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: fadeSlideUp 1s ease-out;
        }

        @keyframes fadeSlideUp {
            from { 
                opacity: 0; 
                transform: translateY(30px) scale(0.96); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }

        h2 {
            text-align: center;
            color: #1B5E20;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 700;
            font-size: 28px;
            text-shadow: 0px 2px 4px rgba(255,255,255,0.8);
            animation: fadeIn 1.5s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        form {
            animation: fadeIn 1.8s ease-out 0.4s both;
        }

        input, select, button {
            font-family: 'EB Garamond', Garamond, Georgia, serif;
            width: 100%;
            padding: 12px;
            margin: 0 0 16px 0;
            border-radius: 10px;
            border: 1px solid rgba(46, 125, 50, 0.4);
            box-sizing: border-box;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.92);
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.15);
            background: rgba(255, 255, 255, 1);
            transform: translateY(-1px);
        }

        button {
            padding: 13px;
            background: linear-gradient(135deg, #4CAF50, #388E3C);
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 17px;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }

        button::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            background: linear-gradient(135deg, #388E3C, #2E7D32);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.6);
        }

        button:active {
            transform: translateY(0px);
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>ClinicVault Login Page</h2>
        <form method="POST" action="/login">
            <select name="role" required>
                <option value="">Select Role</option>
                <option value="admin">Admin</option>
                <option value="doctor">Doctor</option>
                <option value="patient">Patient</option>
                <option value="external">External</option>
            </select>
            <input type="text" name="username" placeholder="Username" required>
            <input type="text" name="user_id" placeholder="User ID" required>
            <input type="text" name="phone" placeholder="Phone Number" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
