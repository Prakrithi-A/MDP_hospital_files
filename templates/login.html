<!DOCTYPE html>
<html>
<head>
    <title>Hospital Login</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #B2E0B2, #8CCB8C);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 35px;
            border-radius: 15px;
            width: 360px;
            box-shadow: 0px 6px 20px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            color: #5DAA5D;
            margin-bottom: 10px;
        }

        p.subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 20px;
            font-size: 14px;
        }

        label {
            font-weight: 600;
            color: #2A6A2A;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #66BB6A;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #66BB6A;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #388E3C;
        }

    </style>

</head>
<body>

<div class="login-container">

    <h2>Hospital Login</h2>
    <p class="subtitle">Secure Medical Records System</p>

    <form method="POST" action="/login">

        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="Enter phone number">

        <label>User ID</label>
        <input type="text" name="user_id" required>

        <label>Password</label>
        <input type="password" name="password">

        <label>Login As</label>
        <select name="role">
            <option value="admin">Admin</option>
            <option value="doctor">Doctor</option>
            <option value="patient">Patient</option>
            <option value="external">External</option>
        </select>

        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
