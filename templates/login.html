<!DOCTYPE html>
<html>
<head>
    <title>Hospital Login</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'EB Garamond', Garamond, Georgia, serif;
            background-image: url("/static/login_image.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Optional: subtle overlay so the form is readable */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(232, 245, 233, 0.2); /* lighter green tint */
            z-index: 0;
        }

        .container {
            background: rgba(152, 251, 152, 0.3); /* #98FB98 pale green, very see-through */
            padding: 30px;
            border-radius: 15px;
            width: 380px;
            box-shadow: 0px 6px 20px rgba(0,0,0,0.2);
            backdrop-filter: blur(12px); /* stronger blur for glass effect */
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        h2 {
            text-align: center;
            color: #1B5E20; /* dark green for contrast */
            margin-top: 0;
            font-weight: 700;
            text-shadow: 0px 1px 2px rgba(255,255,255,0.6);
        }

        input, select, button {
            font-family: 'EB Garamond', Garamond, Georgia, serif;
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border-radius: 8px;
            border: 1px solid rgba(46, 125, 50, 0.4);
            box-sizing: border-box;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
        }

        button {
            padding: 12px;
            background: #4CAF50; /* green login button */
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            background: #388E3C;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>ClinicVault Login Page</h2>
        <form method="POST" action="/login">
            <select name="role" required>
                <option value="">Select Role</option>
                <option value="admin">Admin</option>
                <option value="doctor">Doctor</option>
                <option value="patient">Patient</option>
                <option value="external">External</option>
            </select>
            <input type="text" name="username" placeholder="Username" required>
            <input type="text" name="user_id" placeholder="User ID" required>
            <input type="text" name="phone" placeholder="Phone Number" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
