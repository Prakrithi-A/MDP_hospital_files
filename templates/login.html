<!DOCTYPE html>
<html>
<head>
    <title>Hospital Login</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #E8F5E9, #A5D6A7);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 380px;
            box-shadow: 0px 6px 20px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            color: #2E7D32;
        }

        label {
            font-weight: 600;
            color: #2E7D32;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #66BB6A;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #388E3C;
        }
    </style>

    <script>
        function updateForm() {
            let role = document.getElementById("role").value;

            document.getElementById("patientFields").style.display = "none";
            document.getElementById("doctorFields").style.display = "none";
            document.getElementById("adminFields").style.display = "none";
            document.getElementById("externalMsg").style.display = "none";

            if (role === "patient") {
                document.getElementById("patientFields").style.display = "block";
            }
            else if (role === "doctor") {
                document.getElementById("doctorFields").style.display = "block";
            }
            else if (role === "admin") {
                document.getElementById("adminFields").style.display = "block";
            }
            else {
                document.getElementById("externalMsg").style.display = "block";
            }
        }
    </script>

</head>
<body>

<div class="container">

    <h2>Hospital Login</h2>

    <form method="POST" action="/login">

        <label>Select Role</label>
        <select name="role" id="role" onchange="updateForm()" required>
            <option value="">-- Select --</option>
            <option value="admin">Admin</option>
            <option value="doctor">Doctor</option>
            <option value="patient">Patient</option>
            <option value="external">External</option>
        </select>

        <!-- PATIENT -->
        <div id="patientFields" style="display:none;">
            <label>Username</label>
            <input type="text" name="username">

            <label>Registered Phone Number</label>
            <input type="text" name="phone">

            <label>Patient ID</label>
            <input type="text" name="user_id">

            <label>Password</label>
            <input type="password" name="password">
        </div>

        <!-- DOCTOR -->
        <div id="doctorFields" style="display:none;">
            <label>Username</label>
            <input type="text" name="username">

            <label>Registered Phone Number</label>
            <input type="text" name="phone">

            <label>Doctor ID</label>
            <input type="text" name="user_id">

            <label>Password</label>
            <input type="password" name="password">
        </div>

        <!-- ADMIN -->
        <div id="adminFields" style="display:none;">
            <label>Username</label>
            <input type="text" name="username">

            <label>Admin ID</label>
            <input type="text" name="user_id">

            <label>Registered Phone Number</label>
            <input type="text" name="phone">

            <label>Password</label>
            <input type="password" name="password">
        </div>

        <!-- EXTERNAL -->
        <div id="externalMsg" style="display:none;">
            <p style="text-align:center; color: gray;">
                External users have no access to records.
            </p>
        </div>

        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
