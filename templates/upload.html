<!DOCTYPE html>
<html>
<head>
    <title>Upload File</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(to right, #E8F5E9, #A5D6A7);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #2E7D32;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0px 6px 20px rgba(0,0,0,0.15);
        }

        label {
            font-weight: 600;
            color: #2E7D32;
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #66BB6A;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #388E3C;
        }

        .back-btn {
            margin-top: 15px;
            display: inline-block;
            padding: 10px 15px;
            background: #2E7D32;
            color: white;
            border-radius: 8px;
            text-decoration: none;
        }

        .back-btn:hover {
            background: #1B5E20;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>Upload Patient Record</h1>

    <div class="card">

        <form method="POST" enctype="multipart/form-data">

            <label>Patient ID</label>
            <input type="text" name="patient_id" placeholder="Enter Patient ID" required>

            <label>Doctor ID</label>
            <input type="text" name="doctor_id" placeholder="Enter Doctor ID" required>

            <label>Select File</label>
            <input type="file" name="file" required>

            <button type="submit">Upload</button>

        </form>

        <a href="/admin" class="back-btn">← Back to Dashboard</a>

    </div>

</div>

</body>
</html>
