<!DOCTYPE html>
<html>
<head>
    <title>Doctors List</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #E8F5E9, #A5D6A7);
            padding: 40px;
            text-align: center;
        }

        h2 {
            color: #2E7D32;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #66BB6A;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .empty {
            margin-top: 20px;
            color: #555;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #2E7D32;
            font-weight: 600;
        }
    </style>
</head>

<body>

<h2>Doctors List</h2>

{% if doctors %}
<table>
    <tr>
        <th>Doctor ID</th>
        <th>Name</th>
        <th>Specialization</th>
        <th>Experience</th>
        <th>Phone</th>
    </tr>

    {% for d in doctors %}
    <tr>
        <td>{{ d['doctor_id'] }}</td>
        <td>{{ d['name'] }}</td>
        <td>{{ d['specialization'] }}</td>
        <td>{{ d['experience'] }}</td>
        <td>{{ d['phone'] }}</td>
    </tr>
    {% endfor %}
</table>
{% else %}
    <p class="empty">No doctors found.</p>
{% endif %}

<a href="{{ url_for('admin_dashboard') }}">← Back to Dashboard</a>

</body>
</html>
