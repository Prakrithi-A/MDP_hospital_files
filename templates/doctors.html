<!DOCTYPE html>
<html>
<head>
    <title>Doctors List</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #E8F5E9, #C8E6C9, #A5D6A7);
            padding: 20px;
            text-align: center;
        }

        h2 {
            color: #1B5E20;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 90%;
            margin: auto;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.15);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background: #66BB6A;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #E8F5E9;
        }

        .back {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #1B5E20;
            font-weight: bold;
        }

        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<h2>All Doctors</h2>

<div class="card">

    <table>
        <tr>
            <th>Doctor ID</th>
            <th>Name</th>
            <th>Specialization</th>
            <th>Experience</th>
            <th>Phone</th>
        </tr>

        {% for d in doctors %}
        <tr>
            <td>{{ d['doctor_id'] }}</td>
            <td>{{ d['name'] }}</td>
            <td>{{ d['specialization'] }}</td>
            <td>{{ d['experience'] }}</td>
            <td>{{ d['phone'] }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

<a class="back" href="{{ url_for('admin_dashboard') }}">← Back to Dashboard</a>

</body>
</html>
