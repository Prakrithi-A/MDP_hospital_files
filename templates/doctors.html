<!DOCTYPE html>
<html>
<head>
    <title>Manage Doctors</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #E8F5E9, #A5D6A7);
            padding: 30px;
            text-align: center;
        }

        h2 {
            color: #1B5E20;
        }

        .card {
            background: white;
            padding: 20px;
            width: 95%;
            margin: auto;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.15);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #2E7D32;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #E8F5E9;
        }
    </style>
</head>

<body>

<h2>Doctors List</h2>

<div class="card">

    <table>
        <tr>
            <th>Doctor ID</th>
            <th>Name</th>
            <th>Specialization</th>
            <th>Experience</th>
            <th>Phone</th>
        </tr>

        {% for d in doctors %}
        <tr>
            <td>{{ d['doctor_id'] }}</td>
            <td>{{ d['name'] }}</td>
            <td>{{ d['specialization'] }}</td>
            <td>{{ d['experience'] }}</td>
            <td>{{ d['phone'] }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
