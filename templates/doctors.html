<!DOCTYPE html>
<html>
<head>
    <title>Doctors List</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #E8F5E9, #A5D6A7);
            padding: 40px;
            text-align: center;
        }

        h2 {
            color: #2E7D32;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #66BB6A;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #2E7D32;
            font-weight: 600;
        }
    </style>
</head>

<body>

<h2>Doctors List</h2>

<table>
    <tr>
        <th>Doctor ID</th>
        <th>Name</th>
        <th>Specialization</th>
        <th>Experience</th>
        <th>Phone</th>
    </tr>

    {% for d in doctors %}
    <tr>
        <td>{{ d[0] }}</td>
        <td>{{ d[1] }}</td>
        <td>{{ d[2] }}</td>
        <td>{{ d[3] }}</td>
        <td>{{ d[4] }}</td>
    </tr>
    {% endfor %}
</table>

<a href="{{ url_for('admin_dashboard') }}">← Back to Dashboard</a>

</body>
</html>
